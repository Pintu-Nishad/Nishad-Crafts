<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nishad Snap-Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: 100dvh; }
        #messages::-webkit-scrollbar { width: 4px; }
        
        /* Snapchat Style Floating Video */
        #video-frame {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 40%; /* Badi screen ka 40% hissa video call ke liye */
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            z-index: 30;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: none; /* Default hidden */
        }
        
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        
        #local-video-container {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 90px;
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 40;
        }
        
        #local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .video-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 50;
        }
        
        .control-btn {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Adjustment for chat when video is on */
        .messages-shift { margin-top: 42% !important; }
    </style>
</head>
<body class="bg-slate-950 text-white overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-[100] p-6">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-md border border-slate-800">
            <h2 class="text-2xl font-bold text-blue-500 mb-6 text-center">Nishad Private Call</h2>
            <input type="text" id="room-input" placeholder="Room Name" class="w-full p-4 bg-slate-800 rounded-2xl mb-4 outline-none">
            <input type="text" id="user-input" placeholder="Your Name" class="w-full p-4 bg-slate-800 rounded-2xl mb-6 outline-none">
            <button id="join-btn" class="w-full bg-blue-600 p-4 rounded-2xl font-bold">Join & Chat</button>
        </div>
    </div>

    <div id="chat-ui" class="hidden chat-container flex flex-col max-w-2xl mx-auto bg-slate-900 relative">
        
        <div id="video-frame">
            <video id="remote-video" autoplay playsinline></video>
            
            <div id="local-video-container">
                <video id="local-video" autoplay playsinline muted></video>
            </div>

            <div class="video-controls">
                <button onclick="toggleMic()" id="mic-btn" class="control-btn">🎤</button>
                <button onclick="toggleCam()" id="cam-btn" class="control-btn">📷</button>
                <button onclick="minimizeVideo()" class="control-btn">📉</button>
            </div>
        </div>

        <header class="p-4 border-b border-slate-800 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" id="room-icon">N</div>
                <span id="room-display" class="font-bold">Room</span>
            </div>
            <div class="flex gap-2">
                <button id="call-btn" class="bg-blue-600/20 text-blue-400 p-2 px-4 rounded-full text-xs font-bold border border-blue-500/30">Start Call</button>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 p-2 px-4 rounded-full text-xs font-bold">Exit</button>
            </div>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 transition-all duration-500">
            </div>

        <footer class="p-4 bg-slate-900 border-t border-slate-800">
            <div class="flex items-center gap-2 bg-slate-800 p-2 rounded-2xl">
                <textarea id="msg-input" rows="1" placeholder="Type a message..." class="flex-1 bg-transparent p-2 outline-none text-sm resize-none"></textarea>
                <button id="send-btn" class="bg-blue-600 p-2.5 rounded-xl text-white">
                    <svg viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
                </button>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // Firebase Config (Aapki Same Details)
        const firebaseConfig = {
            apiKey: "AIzaSyD3HUZgZ1G2hN4BXnIbRV8eD0nPlWUaByM",
            authDomain: "galk-55f49.firebaseapp.com",
            projectId: "galk-55f49",
            storageBucket: "galk-55f49.firebasestorage.app",
            messagingSenderId: "1005825050326",
            appId: "1:1005825050326:web:fda4271183b4c4ff106b77"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentRoom, userName, localStream, peerConnection;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302'] }] };

        // UI Controls
        document.getElementById('join-btn').onclick = () => {
            currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
            userName = document.getElementById('user-input').value.trim();
            if (currentRoom && userName) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-ui').classList.remove('hidden');
                document.getElementById('room-display').innerText = currentRoom;
                listenMessages();
                setupReceiver();
            }
        };

        // WebRTC Logic
        async function startCall() {
            document.getElementById('video-frame').style.display = 'block';
            document.getElementById('messages').classList.add('messages-shift');
            
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.ontrack = e => document.getElementById('remote-video').srcObject = e.streams[0];

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await setDoc(doc(db, "calls", currentRoom), { offer });
        }

        function setupReceiver() {
            onSnapshot(doc(db, "calls", currentRoom), async (snap) => {
                const data = snap.data();
                if (data?.offer && !peerConnection) {
                    if(confirm("Join Video Call?")) {
                        startCall(); // Simplified for P2P handshake
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        await setDoc(doc(db, "calls", currentRoom), { answer }, { merge: true });
                    }
                }
                if (data?.answer && peerConnection) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });
        }

        // Feature: Minimize
        window.minimizeVideo = () => {
            const frame = document.getElementById('video-frame');
            const msgs = document.getElementById('messages');
            if(frame.style.height === '40%') {
                frame.style.height = '120px';
                msgs.style.marginTop = '130px';
            } else {
                frame.style.height = '40%';
                msgs.style.marginTop = '42%';
            }
        };

        window.toggleMic = () => {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('mic-btn').innerText = t.enabled ? '🎤' : '🔇';
        };

        window.toggleCam = () => {
            const t = localStream.getVideoTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('cam-btn').innerText = t.enabled ? '📷' : '🚫';
        };

        document.getElementById('call-btn').onclick = startCall;

        // --- Original Chat Logic (Simplified) ---
        async function sendMessage() {
            const text = document.getElementById('msg-input').value.trim();
            if (text) {
                document.getElementById('msg-input').value = "";
                await addDoc(collection(db, "chats"), { room: currentRoom, user: userName, content: text, type: 'text', timestamp: serverTimestamp() });
            }
        }
        document.getElementById('send-btn').onclick = sendMessage;

        function listenMessages() {
            const q = query(collection(db, "chats"), where("room", "==", currentRoom), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const msgDiv = document.getElementById('messages');
                msgDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.user === userName;
                    msgDiv.innerHTML += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[80%] ${isMe ? 'bg-blue-600' : 'bg-slate-800'} p-3 rounded-2xl">
                            <p class="text-xs opacity-50 mb-1">${data.user}</p>
                            <p class="text-sm">${data.content}</p>
                        </div>
                    </div>`;
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }
    </script>
</body>
</html>
