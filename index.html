<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nishad Private Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

<div id="login" class="h-screen flex items-center justify-center">
    <div class="bg-slate-900 p-6 rounded-xl">
        <input id="room" placeholder="Room" class="p-2 m-2 text-black">
        <input id="name" placeholder="Name" class="p-2 m-2 text-black">
        <button id="join" class="bg-blue-500 p-2">Join</button>
    </div>
</div>

<div id="chat" class="hidden p-4">
    <h2 id="roomName"></h2>
    <p id="typing"></p>
    <div id="msgs" class="h-[300px] overflow-auto border"></div>

    <input id="msg" placeholder="Type..." class="text-black p-2">
    <button id="send">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "YOUR_KEY",
 authDomain: "YOUR_DOMAIN",
 projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let room, name;

join.onclick = async () => {
    room = roomInput.value;
    name = nameInput.value;

    login.classList.add("hidden");
    chat.classList.remove("hidden");

    listenMsgs();
    online();
    typingListen();

    await setDoc(doc(db,"online",name),{room});
};

send.onclick = async () => {
    const text = msg.value;
    msg.value="";

    await addDoc(collection(db,"chats"),{
        room,
        user:name,
        text,
        time:new Date(),
        seen:[]
    });
};

function listenMsgs(){
    const q = query(collection(db,"chats"), where("room","==",room));

    onSnapshot(q,snap=>{
        msgs.innerHTML="";
        snap.forEach(d=>{
            const data = d.data();

            if(!data.seen.includes(name)){
                setDoc(doc(db,"chats",d.id),{
                    seen:[...data.seen,name]
                },{merge:true});
            }

            let t = new Date(data.time).toLocaleTimeString();

            msgs.innerHTML += `
            <div>
                <b>${data.user}</b>: ${data.text}
                <small>${t}</small>
                ${data.user===name ? (data.seen.length>1?"✔✔":"✔"):""}
            </div>`;
        });
    });
}

function online(){
    onSnapshot(collection(db,"online"),snap=>{
        let count=0;
        snap.forEach(d=>{
            if(d.data().room===room) count++;
        });
        roomName.innerText = room + " ("+count+" online)";
    });
}

msg.addEventListener("input", async ()=>{
    await setDoc(doc(db,"typing",name),{
        room,
        typing: msg.value.length>0
    });
});

function typingListen(){
    onSnapshot(collection(db,"typing"),snap=>{
        let t="";
        snap.forEach(d=>{
            if(d.data().room===room && d.data().typing && d.id!==name){
                t = d.id + " typing...";
            }
        });
        typing.innerText = t;
    });
}
</script>

</body>
</html>
