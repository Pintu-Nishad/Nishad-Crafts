<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat & Photo Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="login-screen" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl w-full max-w-sm border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Join Chat Room</h2>
            <div class="space-y-4">
                <input type="text" id="room-input" placeholder="Enter Room Name (e.g. MySecretGroup)" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="user-input" placeholder="Your Name" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="join-btn" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition-all shadow-lg active:scale-95">Enter Chat</button>
            </div>
        </div>
    </div>

    <div id="chat-ui" class="hidden max-w-2xl mx-auto h-screen flex flex-col">
        <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
            <div>
                <h1 id="room-display" class="font-bold text-blue-400 text-lg">Room: ...</h1>
                <p id="user-display" class="text-xs text-slate-400"></p>
            </div>
            <button onclick="location.reload()" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-red-900">Leave</button>
        </header>

        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-900">
            </div>

        <footer class="p-4 bg-slate-800 flex items-center gap-3">
            <label class="cursor-pointer bg-slate-700 p-2.5 rounded-full hover:bg-slate-600 transition" title="Send Photo">
                📷
                <input type="file" id="image-input" class="hidden" accept="image/*">
            </label>
            <input type="text" id="msg-input" placeholder="Type message..." class="flex-1 bg-slate-700 p-2.5 rounded-full px-4 outline-none focus:ring-1 focus:ring-blue-500">
            <button id="send-btn" class="bg-blue-600 p-2.5 rounded-full px-5 font-bold hover:bg-blue-500 transition shadow-md">Send</button>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3HUZgZ1G2hN4BXnIbRV8eD0nPlWUaByM",
            authDomain: "galk-55f49.firebaseapp.com",
            projectId: "galk-55f49",
            storageBucket: "galk-55f49.firebasestorage.app",
            messagingSenderId: "1005825050326",
            appId: "1:1005825050326:web:fda4271183b4c4ff106b77",
            measurementId: "G-32CW801HFV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentRoom = "";
        let userName = "";

        // UI Elements
        const loginScreen = document.getElementById('login-screen');
        const chatUi = document.getElementById('chat-ui');
        const msgDiv = document.getElementById('messages');

        // Join Room Logic
        document.getElementById('join-btn').onclick = () => {
            currentRoom = document.getElementById('room-input').value.trim().toLowerCase();
            userName = document.getElementById('user-input').value.trim();

            if (currentRoom && userName) {
                loginScreen.classList.add('hidden');
                chatUi.classList.remove('hidden');
                document.getElementById('room-display').innerText = `Room: ${currentRoom}`;
                document.getElementById('user-display').innerText = `Logged in as: ${userName}`;
                listenMessages();
            } else {
                alert("Please enter both Room and User name!");
            }
        };

        // Listen for messages
        function listenMessages() {
            const q = query(
                collection(db, "chats"),
                where("room", "==", currentRoom),
                orderBy("timestamp", "asc")
            );

            onSnapshot(q, (snapshot) => {
                msgDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.user === userName;
                    const messageElement = document.createElement('div');
                    messageElement.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                    
                    messageElement.innerHTML = `
                        <div class="${isMe ? 'bg-blue-600 text-white rounded-br-none' : 'bg-slate-700 text-slate-100 rounded-bl-none'} p-3 rounded-2xl max-w-[80%] shadow-md">
                            <p class="text-[10px] ${isMe ? 'text-blue-200' : 'text-slate-400'} font-bold uppercase mb-1">${data.user}</p>
                            ${data.type === 'text' ? `<p class="text-sm">${data.content}</p>` : `<img src="${data.content}" class="rounded-lg mt-1 max-h-60 w-full object-cover">`}
                        </div>
                    `;
                    msgDiv.appendChild(messageElement);
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }

        // Send Text
        async function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (text) {
                input.value = "";
                await addDoc(collection(db, "chats"), {
                    room: currentRoom,
                    user: userName,
                    content: text,
                    type: 'text',
                    timestamp: serverTimestamp()
                });
            }
        }

        document.getElementById('send-btn').onclick = sendMsg;
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

        // Send Photo
        document.getElementById('image-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const storageRef = ref(storage, `chats/${currentRoom}/${Date.now()}_${file.name}`);
            const uploadTask = await uploadBytes(storageRef, file);
            const url = await getDownloadURL(uploadTask.ref);

            await addDoc(collection(db, "chats"), {
                room: currentRoom,
                user: userName,
                content: url,
                type: 'image',
                timestamp: serverTimestamp()
            });
        };
    </script>
</body>
</html>
