
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antique Treasure Store</title>
<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:10px;
    background:#222;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.hero{
    height:300px;
    background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1523275335684-37898b6baf30');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

.container{
    padding:40px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.price{
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

button{
    background:#111;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>Antique Treasure</h1>
<p>Rare & Vintage Collectibles</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Collections</a>
<a href="#">Contact</a>
</nav>

<div class="hero">
Vintage Antiques Store
</div>

<div class="container">

<h2>Featured Antiques</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1616627457002-3f0a0f1c3c1e">
<div class="card-body">
<h3>Vintage Pocket Watch</h3>
<p class="price">$120</p>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1567016432779-094069958ea5">
<div class="card-body">
<h3>Antique Camera</h3>
<p class="price">$240</p>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1599940824399-b87987ceb72a">
<div class="card-body">
<h3>Vintage Globe</h3>
<p class="price">$180</p>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1582582429416-6a1b1d2c3a7c">
<div class="card-body">
<h3>Old Typewriter</h3>
<p class="price">$350</p>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1607082350899-7e105aa886ae">
<div class="card-body">
<h3>Antique Compass</h3>
<p class="price">$90</p>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1578926288207-a90a5366759d">
<div class="card-body">
<h3>Vintage Radio</h3>
<p class="price">$210</p>
<button>Add to Cart</button>
</div>
</div>

</div>
</div>

<footer>
<p>© 2026 Antique Treasure Store</p>
</footer>

</body>
</html>
